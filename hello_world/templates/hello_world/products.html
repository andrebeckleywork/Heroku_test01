<!DOCTYPE html>
<html>
<head><title>Products</title></head>
<body>
  <h2>Products</h2>
  <a href="{% url 'logout' %}">Logout</a>
  <hr>
  {% for product in products %}
    <div>
      <h3>{{ product.name }}</h3>
      <p>{{ product.description }}</p>
      <p><strong>£{{ product.cost }}</strong></p>
      <a href="{% url 'buy' product.id %}">
        <button>Buy</button>
      </a>
    </div>
    <hr>
  {% empty %}
    <p>No products available yet. Add some in the admin panel!</p>
  {% endfor %}
</body>
</html>
